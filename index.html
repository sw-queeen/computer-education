<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS.im — 정보컴퓨터 임용</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="layout">

  <header class="topbar">
    <div class="topbar-logo" onclick="navigate({subject:null,chapter:null,concept:null})" style="cursor:pointer;">CS.im</div>
    <div class="topbar-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="globalSearch" placeholder="개념 검색...">
    </div>
    <button class="topbar-menu-btn" onclick="toggleSidebar()" aria-label="메뉴">☰</button>
  </header>

  <div class="body-row">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main"></main>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/config.js"></script>
<script>
/* ── 유틸 ─────────────────────────────────────────── */
function setSubjectVars(subjectName, el) {
  const s = SUBJECTS[subjectName];
  if (!s) return;
  el.style.setProperty('--subject-bg',     s.color.bg);
  el.style.setProperty('--subject-mid',    s.color.mid);
  el.style.setProperty('--subject-accent', s.color.accent);
  el.style.setProperty('--subject-text',   s.color.text);
}
function getParam(key) {
  return new URLSearchParams(location.search).get(key);
}
function navigate(params) {
  if (params.concept) {
    const p = new URLSearchParams();
    if (params.subject) p.set('subject', params.subject);
    if (params.chapter) p.set('chapter', params.chapter);
    p.set('concept', params.concept);
    location.href = 'concept.html?' + p.toString();
    return;
  }
  const url = new URL(location.href);
  Object.keys(params).forEach(k => {
    if (params[k] == null) url.searchParams.delete(k);
    else url.searchParams.set(k, params[k]);
  });
  history.pushState({}, '', url);
  render();
}

/* ── 사이드바 토글 ─────────────────────────────────── */
function isMobile() { return window.innerWidth <= 768; }

function toggleSidebar() {
  if (isMobile()) {
    const isOpen = document.getElementById('sidebar').classList.contains('mobile-open');
    isOpen ? closeSidebar() : openSidebar();
  } else {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('collapsed');
    // 데스크탑도 ☰↔✕ 토글
    const menuBtn = document.querySelector('.topbar-menu-btn');
    if (menuBtn) menuBtn.textContent = sidebar.classList.contains('collapsed') ? '☰' : '✕';
    try { localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed') ? '1' : '0'); } catch(e) {}
  }
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('sidebarOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
  // ☰ 버튼을 ✕로 교체
  const menuBtn = document.querySelector('.topbar-menu-btn');
  if (menuBtn) menuBtn.textContent = '✕';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
  document.body.style.overflow = '';
  // ✕ 버튼을 ☰로 복원
  const menuBtn = document.querySelector('.topbar-menu-btn');
  if (menuBtn) menuBtn.textContent = '☰';
}

window.addEventListener('resize', () => {
  if (!isMobile()) {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').classList.remove('visible');
    document.body.style.overflow = '';
    const menuBtn = document.querySelector('.topbar-menu-btn');
    if (menuBtn) menuBtn.textContent = '☰';
    try {
      const sidebar = document.getElementById('sidebar');
      const saved = localStorage.getItem('sidebar-collapsed');
      if (saved === '1') sidebar.classList.add('collapsed');
      else sidebar.classList.remove('collapsed');
    } catch(e) {}
  }
});

// 초기 저장 상태 복원
try {
  if (!isMobile() && localStorage.getItem('sidebar-collapsed') === '1') {
    document.getElementById('sidebar').classList.add('collapsed');
  }
} catch(e) {}

/* ── 사이드바 렌더 ─────────────────────────────────── */
function renderSidebar() {
  const currentSubject = getParam('subject');
  const areas = {};
  Object.entries(SUBJECTS).forEach(([name, meta]) => {
    if (!areas[meta.area]) areas[meta.area] = [];
    areas[meta.area].push(name);
  });
  let html = '';
  Object.entries(areas).forEach(([area, subjects]) => {
    html += `<div class="sidebar-section"><div class="sidebar-section-title">${area}</div>`;
    subjects.forEach(name => {
      const s = SUBJECTS[name];
      const active = currentSubject === name ? 'active' : '';
      const style = `--subject-bg:${s.color.bg};--subject-mid:${s.color.mid};--subject-accent:${s.color.accent};--subject-text:${s.color.text}`;
      html += `<div class="sidebar-item ${active}" style="${style}"
        onclick="navigate({subject:'${name}',chapter:null,concept:null}); if(isMobile()) closeSidebar();">
        <span class="sidebar-dot" style="background:${s.color.mid}"></span>${name}</div>`;
    });
    html += `</div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}

/* ── 홈 렌더 ───────────────────────────────────────── */
function renderHome() {
  const C = SITE_CONFIG;
  const total     = CONCEPTS.length;
  const highCount = CONCEPTS.filter(c => c.freq === '높음').length;
  const vizCount  = CONCEPTS.filter(c => c.viz).length;
  const areas = {};
  Object.entries(SUBJECTS).forEach(([name, meta]) => {
    if (!areas[meta.area]) areas[meta.area] = [];
    const count = CONCEPTS.filter(c => c.subject === name).length;
    areas[meta.area].push({ name, meta, count });
  });
  let html = `
    <div class="home-hero">
      <h1>${C.siteName}</h1>
      <p>${C.heroDesc}</p>
      <div class="stats-row">
        <div class="stat-pill"><strong>${total}</strong>개 개념 카드</div>
        <div class="stat-pill">${C.freq.high} <strong>${highCount}</strong>개</div>
        <div class="stat-pill">${C.badges.viz} <strong>${vizCount}</strong>개</div>
      </div>
    </div>`;
  Object.entries(areas).forEach(([area, subjects]) => {
    html += `<div class="area-section"><div class="area-title">${area}</div><div class="subject-grid">`;
    subjects.forEach(({ name, meta, count }) => {
      const style = `--subject-accent:${meta.color.accent};--subject-mid:${meta.color.mid};--subject-bg:${meta.color.bg};--subject-text:${meta.color.text}`;
      html += `<div class="subject-card" style="${style}" onclick="navigate({subject:'${name}',chapter:null,concept:null})">
        <div class="subject-card-name">${name}</div>
        <div class="subject-card-area">${area}</div>
        <div class="subject-card-count">개념 ${count}개 →</div></div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('main').innerHTML = html;
}

/* ── 과목 렌더 ─────────────────────────────────────── */
function renderSubject(subjectName) {
  const C = SITE_CONFIG;
  const s = SUBJECTS[subjectName];
  if (!s) return renderHome();
  const concepts = CONCEPTS.filter(c => c.subject === subjectName);
  const chapters = [...new Set(concepts.map(c => c.chapter))];
  setSubjectVars(subjectName, document.getElementById('main'));
  const highC = concepts.filter(c => c.freq === '높음').length;
  const vizC  = concepts.filter(c => c.viz).length;
  const freqLabel = f => f==='높음'?C.freq.high : f==='중간'?C.freq.mid : C.freq.low;
  const freqClass = f => f==='높음'?'badge-high' : f==='중간'?'badge-mid' : 'badge-low';
  let html = `
    <div class="page-header">
      <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:6px;">
        <span onclick="navigate({subject:null,chapter:null,concept:null})" style="cursor:pointer;">홈</span>
        <span style="margin:0 6px;">›</span>${subjectName}
      </div>
      <div class="page-title">${subjectName}</div>
      <div class="page-meta">
        <span>${s.area}</span>
        <span class="count">${concepts.length}개 개념</span>
        <span>${C.freq.high} ${highC}개</span>
        <span>${C.badges.viz} ${vizC}개</span>
      </div>
    </div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all"  onclick="applyFilter('all')">${C.filters.all}</button>
      <button class="filter-btn"        data-filter="high" onclick="applyFilter('high')">${C.filters.high}</button>
      <button class="filter-btn"        data-filter="viz"  onclick="applyFilter('viz')">${C.filters.viz}</button>
      <button class="filter-btn"        data-filter="quiz" onclick="applyFilter('quiz')">${C.filters.quiz}</button>
    </div>
    <div id="chaptersContainer">`;
  chapters.forEach(chapter => {
    const cc = concepts.filter(c => c.chapter === chapter);
    html += `<div class="chapter-section" data-chapter="${chapter}">
      <div class="chapter-title" style="background:${s.color.bg};color:${s.color.text};">
        ${chapter} <span style="font-weight:400;opacity:.7;">${cc.length}</span>
      </div>
      <div class="card-grid">`;
    cc.forEach(concept => {
      html += `<div class="concept-card" style="border-left-color:${s.color.mid};"
        data-freq="${concept.freq}" data-viz="${concept.viz}" data-quiz="${concept.quiz}"
        onclick="navigate({subject:'${subjectName}',chapter:'${encodeURIComponent(chapter)}',concept:'${encodeURIComponent(concept.name)}'})">
        <div class="concept-card-name">${concept.name}</div>
        <div class="concept-card-keywords">${concept.keywords}</div>
        <div class="concept-card-footer">
          <span class="badge ${freqClass(concept.freq)}">${freqLabel(concept.freq)}</span>
          ${concept.viz  ? `<span class="badge" style="background:#F0EDE8;color:#A09890;">${C.badges.viz}</span>` : ''}
          ${concept.quiz ? `<span class="badge" style="background:#F0EDE8;color:#A09890;">${C.badges.quiz}</span>` : ''}
        </div></div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  document.getElementById('main').innerHTML = html;
  setSubjectVars(subjectName, document.getElementById('main'));
}

function applyFilter(filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  document.querySelectorAll('.concept-card').forEach(card => {
    let show = true;
    if (filter === 'high') show = card.dataset.freq === '높음';
    if (filter === 'viz')  show = card.dataset.viz  === 'true';
    if (filter === 'quiz') show = card.dataset.quiz === 'true';
    card.style.display = show ? '' : 'none';
  });
  document.querySelectorAll('.chapter-section').forEach(sec => {
    const visible = [...sec.querySelectorAll('.concept-card')].some(c => c.style.display !== 'none');
    sec.style.display = visible ? '' : 'none';
  });
}

/* ── 검색 ──────────────────────────────────────────── */
document.getElementById('globalSearch').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { render(); return; }
  const results = CONCEPTS.filter(c =>
    c.name.toLowerCase().includes(q) || c.keywords.toLowerCase().includes(q) || c.subject.toLowerCase().includes(q)
  );
  let html = `<div class="page-header">
    <div class="page-title">"${this.value}" 검색 결과</div>
    <div class="page-meta"><span class="count">${results.length}개</span></div>
  </div><div class="card-grid">`;
  results.forEach(concept => {
    const s = SUBJECTS[concept.subject];
    if (!s) return;
    html += `<div class="concept-card" style="border-left-color:${s.color.mid};"
      onclick="navigate({subject:'${concept.subject}',chapter:'${encodeURIComponent(concept.chapter)}',concept:'${encodeURIComponent(concept.name)}'}); this.closest('#main').querySelector('#globalSearch') && (document.getElementById('globalSearch').value='');">
      <div style="font-size:10px;color:${s.color.accent};margin-bottom:4px;font-weight:600;">${concept.subject} › ${concept.chapter}</div>
      <div class="concept-card-name">${concept.name}</div>
      <div class="concept-card-keywords">${concept.keywords}</div></div>`;
  });
  html += `</div>`;
  document.getElementById('main').innerHTML = html;
});

/* ── 라우터 ────────────────────────────────────────── */
function render() {
  const subject = getParam('subject');
  renderSidebar();
  if (!subject) renderHome();
  else renderSubject(subject);
}

window.addEventListener('popstate', render);
render();
</script>
</body>
</html>

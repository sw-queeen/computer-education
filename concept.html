<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS.im — 정보컴퓨터 임용</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="layout">

  <header class="topbar">
    <div class="topbar-logo" onclick="location.href='index.html'" style="cursor:pointer;">CS.im</div>
    <div class="topbar-breadcrumb" id="breadcrumb"></div>
    <div class="topbar-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="conceptSearch" placeholder="개념 검색...">
    </div>
    <button class="topbar-menu-btn" onclick="toggleSidebar()" aria-label="메뉴">☰</button>
  </header>

  <div class="body-row">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main"></main>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/config.js"></script>
<script>
/* ── URL 파라미터 ─────────────────────────────────── */
function getParam(key) { return new URLSearchParams(location.search).get(key); }
const subjectName = getParam('subject') || '';
const conceptName = getParam('concept') ? decodeURIComponent(getParam('concept')) : '';

/* ── 시각화 / 콘텐츠 매핑 ──────────────────────────── */
const VIZ_MAP = {
  '피아제 인지발달 4단계':    'visualizations/piaget.js',
  '부울 대수·게이트·카르노맵': 'visualizations/boole.js',
  '가네 9가지 수업사태':      'visualizations/gagne.js',
};
const CONTENT_MAP = {
  '피아제 인지발달 4단계':    'visualizations/piaget-content.js',
  '부울 대수·게이트·카르노맵': 'visualizations/boole-content.js',
  '가네 9가지 수업사태':      'visualizations/gagne-content.js',
};

/* ── 사이드바 토글 ─────────────────────────────────── */
function isMobile() { return window.innerWidth <= 768; }

function toggleSidebar() {
  if (isMobile()) {
    const isOpen = document.getElementById('sidebar').classList.contains('mobile-open');
    isOpen ? closeSidebar() : openSidebar();
  } else {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('collapsed');
    // 데스크탑도 ☰↔✕ 토글
    const menuBtn = document.querySelector('.topbar-menu-btn');
    if (menuBtn) menuBtn.textContent = sidebar.classList.contains('collapsed') ? '☰' : '✕';
    try { localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed') ? '1' : '0'); } catch(e) {}
  }
}

function openSidebar() {
  const sidebar = document.getElementById('sidebar');
  // 첫 열기 시 트랜지션 활성화
  if (!sidebar.classList.contains('sidebar-ready')) {
    sidebar.classList.add('sidebar-ready');
  }
  sidebar.classList.add('mobile-open');
  document.getElementById('sidebarOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
  const menuBtn = document.querySelector('.topbar-menu-btn');
  if (menuBtn) menuBtn.textContent = '✕';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
  document.body.style.overflow = '';
  const menuBtn = document.querySelector('.topbar-menu-btn');
  if (menuBtn) menuBtn.textContent = '☰';
}

window.addEventListener('resize', () => {
  if (!isMobile()) {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').classList.remove('visible');
    document.body.style.overflow = '';
    const menuBtn = document.querySelector('.topbar-menu-btn');
    if (menuBtn) menuBtn.textContent = '☰';
    try {
      const sidebar = document.getElementById('sidebar');
      const saved = localStorage.getItem('sidebar-collapsed');
      if (saved === '1') sidebar.classList.add('collapsed');
      else sidebar.classList.remove('collapsed');
    } catch(e) {}
  }
});

try {
  if (!isMobile() && localStorage.getItem('sidebar-collapsed') === '1') {
    document.getElementById('sidebar').classList.add('collapsed');
  }
} catch(e) {}

/* ── 사이드바 렌더 ─────────────────────────────────── */
function renderSidebar() {
  const areas = {};
  Object.entries(SUBJECTS).forEach(([name, meta]) => {
    if (!areas[meta.area]) areas[meta.area] = [];
    areas[meta.area].push(name);
  });
  let html = '';
  Object.entries(areas).forEach(([area, subjects]) => {
    html += `<div class="sidebar-section"><div class="sidebar-section-title">${area}</div>`;
    subjects.forEach(name => {
      const s = SUBJECTS[name];
      const active = subjectName === name ? 'active' : '';
      const style = `--subject-bg:${s.color.bg};--subject-mid:${s.color.mid};--subject-accent:${s.color.accent};--subject-text:${s.color.text}`;
      html += `<div class="sidebar-item ${active}" style="${style}"
        onclick="location.href='index.html?subject=${encodeURIComponent(name)}'">
        <span class="sidebar-dot" style="background:${s.color.mid}"></span>${name}</div>`;
    });
    html += `</div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}

/* ── 브레드크럼 ────────────────────────────────────── */
function renderBreadcrumb() {
  document.getElementById('breadcrumb').innerHTML = `
    <a href="index.html">홈</a>
    <span class="sep">›</span>
    <a href="index.html?subject=${encodeURIComponent(subjectName)}">${subjectName}</a>
    <span class="sep">›</span>
    <span style="color:var(--text-primary);">${conceptName}</span>`;
  if (conceptName) document.title = `${conceptName} — CS.im`;
}

/* ── 탭 전환 ───────────────────────────────────────── */
function switchTab(btn, targetId) {
  document.querySelectorAll('.detail-tab').forEach(t => {
    t.classList.remove('active');
    t.style.color = '';
    t.style.borderBottomColor = '';
  });
  const s = SUBJECTS[subjectName];
  if (s) { btn.style.color = s.color.accent; btn.style.borderBottomColor = s.color.accent; }
  btn.classList.add('active');
  ['tab-summary','tab-viz','tab-exam','tab-quiz'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = id === targetId ? '' : 'none';
  });
  // 탭 전환 시 탭 바 위치로 스크롤
  setTimeout(() => {
    const tabBar = document.querySelector('.detail-tabs');
    if (tabBar) tabBar.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

/* ── 파일 로드 ─────────────────────────────────────── */
function loadViz(name) {
  const vizFile = VIZ_MAP[name];
  const container = document.getElementById('viz-container');
  if (!container) return;
  if (vizFile) {
    // 이미 로드된 경우 재실행 방지
    const existingId = 'viz-script-' + name.replace(/[^a-zA-Z0-9가-힣]/g, '_');
    if (document.getElementById(existingId)) return;
    const s = document.createElement('script');
    s.id = existingId;
    s.src = vizFile;
    s.onerror = () => { container.innerHTML = `<div class="content-placeholder">시각화를 불러올 수 없어요.</div>`; };
    document.body.appendChild(s);
  } else {
    container.innerHTML = `<div class="content-placeholder">아직 시각화가 준비되지 않았어요.</div>`;
  }
}
function loadContent(name) {
  const f = CONTENT_MAP[name];
  if (!f) return;
  // 특수문자 제거한 안전한 ID 생성
  const id = 'cs-' + name.replace(/[^a-zA-Z0-9가-힣]/g, '_');
  if (document.getElementById(id)) return;
  const s = document.createElement('script');
  s.id = id; s.src = f;
  document.body.appendChild(s);
}

/* ── 메인 렌더 ─────────────────────────────────────── */
function renderConcept() {
  const C = SITE_CONFIG;
  const s = SUBJECTS[subjectName];
  const concept = CONCEPTS.find(c => c.subject === subjectName && c.name === conceptName);
  if (!s || !concept) {
    document.getElementById('main').innerHTML = `
      <div style="padding:40px;text-align:center;color:var(--text-tertiary);">
        ${C.ui.notFound} <a href="index.html" style="color:var(--text-secondary);">${C.ui.goHome}</a>
      </div>`;
    return;
  }
  const main = document.getElementById('main');
  main.style.setProperty('--subject-bg',     s.color.bg);
  main.style.setProperty('--subject-mid',    s.color.mid);
  main.style.setProperty('--subject-accent', s.color.accent);
  main.style.setProperty('--subject-text',   s.color.text);

  const hasViz  = !!VIZ_MAP[conceptName];
  const hasQuiz = concept.quiz;
  const freqLabel = f => f==='높음'?C.freq.high : f==='중간'?C.freq.mid : C.freq.low;
  const freqClass = f => f==='높음'?'badge-high' : f==='중간'?'badge-mid' : 'badge-low';
  const vizTab  = hasViz  ? `<div class="detail-tab" onclick="switchTab(this,'tab-viz')">${C.tabs.viz}</div>` : '';
  const quizTab = hasQuiz ? `<div class="detail-tab" onclick="switchTab(this,'tab-quiz')">${C.tabs.quiz}</div>` : '';

  main.innerHTML = `
    <div class="concept-detail">
      <div class="detail-header" style="background:${s.color.bg};">
        <div class="detail-subject-path">${subjectName} › ${concept.chapter}</div>
        <div class="detail-title" style="color:${s.color.text};">${concept.name}</div>
        <div class="detail-keywords" style="color:${s.color.text};">${concept.keywords}</div>
        <div class="detail-badges">
          <span class="badge ${freqClass(concept.freq)}">${freqLabel(concept.freq)}</span>
          ${hasViz  ? `<span class="badge" style="background:var(--bg-surface,#F0EDE8);color:var(--text-tertiary,#A09890);">${C.badges.viz}</span>` : ''}
          ${hasQuiz ? `<span class="badge" style="background:var(--bg-surface,#F0EDE8);color:var(--text-tertiary,#A09890);">${C.badges.quiz}</span>` : ''}
        </div>
      </div>
      <div class="detail-tabs">
        <div class="detail-tab active"
          style="color:${s.color.accent};border-bottom-color:${s.color.accent};"
          onclick="switchTab(this,'tab-summary')">${C.tabs.summary}</div>
        ${vizTab}
        ${quizTab}
        <div class="detail-tab" onclick="switchTab(this,'tab-exam')">${C.tabs.exam}</div>
      </div>
      <div id="tab-summary">
        <div class="detail-section">
          <div class="detail-section-title" style="--subject-accent:${s.color.accent};">${C.summary.intro}</div>
          <div class="content-placeholder">
            이 개념의 핵심 정리 내용을 여기에 작성하세요.<br>
            <small style="margin-top:8px;display:block;">키워드: ${concept.keywords}</small>
          </div>
        </div>
      </div>
      <div id="tab-viz" style="display:none;">
        <div class="detail-section">
          <div class="detail-section-title" style="--subject-accent:${s.color.accent};">${conceptName}</div>
          <div id="viz-container"></div>
        </div>
      </div>
      <div id="tab-exam" style="display:none;">
        <div class="detail-section">
          <div class="detail-section-title" style="--subject-accent:${s.color.accent};">${C.tabs.exam}</div>
          <div class="content-placeholder">연도별 출제 키워드와 ${C.exam.essay}를 작성하세요.</div>
        </div>
      </div>
      <div id="tab-quiz" style="display:none;">
        <div class="detail-section">
          <div class="detail-section-title" style="--subject-accent:${s.color.accent};">${C.tabs.quiz}</div>
          <div class="content-placeholder">O/X 문제, 빈칸 채우기 퀴즈를 작성하세요.</div>
        </div>
      </div>
    </div>`;

  loadViz(conceptName);
  loadContent(conceptName);
}

/* ── 초기화 ────────────────────────────────────────── */
renderSidebar();
renderBreadcrumb();
renderConcept();

/* ── concept.html 내 인라인 검색 ──────────────────── */
(function() {
  const input = document.getElementById('conceptSearch');
  if (!input) return;

  const dropdown = document.createElement('div');
  dropdown.id = 'searchDropdown';
  dropdown.style.cssText = 'position:absolute;top:calc(100% + 6px);right:0;left:0;background:var(--bg-white);border:1px solid var(--border-light);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:500;max-height:320px;overflow-y:auto;display:none;';
  input.parentElement.style.position = 'relative';
  input.parentElement.appendChild(dropdown);

  function showResults(q) {
    if (!q) { dropdown.style.display = 'none'; return; }
    const results = CONCEPTS.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.keywords.toLowerCase().includes(q) ||
      c.subject.toLowerCase().includes(q)
    ).slice(0, 12);

    if (!results.length) {
      dropdown.innerHTML = '<div style="padding:14px 16px;font-size:13px;color:var(--text-tertiary);">검색 결과 없음</div>';
    } else {
      dropdown.innerHTML = results.map(c => {
        const s = SUBJECTS[c.subject];
        return `<div onmousedown="location.href='concept.html?subject=${encodeURIComponent(c.subject)}&concept=${encodeURIComponent(c.name)}'"
          style="padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border-light);font-size:13px;"
          onmouseover="this.style.background='var(--bg-surface)'" onmouseout="this.style.background=''">
          <div style="font-weight:600;color:var(--text-primary);">${c.name}</div>
          <div style="font-size:11px;color:${s?.color.accent || 'var(--text-tertiary)'};">${c.subject} › ${c.chapter}</div>
        </div>`;
      }).join('');
    }
    dropdown.style.display = 'block';
  }

  input.addEventListener('input', function() {
    showResults(this.value.trim().toLowerCase());
  });

  // blur로 닫기 (mousedown으로 결과 클릭 후 blur 발생 전에 이동하므로 안전)
  input.addEventListener('blur', () => {
    setTimeout(() => { dropdown.style.display = 'none'; }, 150);
  });
})();
</script>
</body>
</html>
